<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="90" fill="#1a1a2e"/>

  <!-- Arc -->
  <path d="M 60 390 A 206 206 0 0 1 452 390"
        fill="none" stroke="#FFD700" stroke-width="30" stroke-linecap="round"/>

  <!-- Brick body (sits at apex of arc, y=184) -->
  <rect x="207" y="184" width="98" height="78" rx="6" fill="#FFD700"/>
  <!-- Bottom shading on brick -->
  <rect x="207" y="242" width="98" height="20" rx="0 0 6 6" fill="#B8960C" opacity="0.6"/>
  <!-- Right shading on brick -->
  <rect x="275" y="184" width="30" height="78" rx="0 6 6 0" fill="#B8960C" opacity="0.2"/>

  <!-- Stud cylinder body -->
  <rect x="229" y="148" width="54" height="38" fill="#FFD700"/>
  <!-- Stud right shading -->
  <rect x="261" y="148" width="22" height="38" fill="#B8960C" opacity="0.2"/>
  <!-- Stud bottom ellipse (where stud meets brick top) -->
  <ellipse cx="256" cy="186" rx="27" ry="9" fill="#D4A800"/>
  <!-- Stud top ellipse (highlight) -->
  <ellipse cx="256" cy="148" rx="27" ry="9" fill="#FFE566"/>
</svg>
