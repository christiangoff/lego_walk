{% extends "base.html" %}
{% block title %}Edit Set - Lego Workout{% endblock %}

{% block content %}
<div class="row mt-3 mb-3">
  <div class="col">
    <h2 class="fw-bold mb-0">
      <i class="bi bi-pencil-fill lego-accent"></i> Edit Lego Set
    </h2>
    <p class="text-muted small mb-0">{{ lego_set.set_number }} &ndash; {{ lego_set.name }}</p>
  </div>
  <div class="col-auto">
    <a href="{{ url_for('sets') }}" class="btn btn-outline-secondary">
      <i class="bi bi-arrow-left"></i> Back
    </a>
  </div>
</div>

<div class="card" style="max-width: 600px; margin: 0 auto;">
  <div class="card-header fw-semibold">
    <i class="bi bi-grid-3x3-gap-fill text-warning"></i> Set Details
  </div>
  <div class="card-body">
    <form method="POST">
      <div class="row g-3">
        <div class="col-sm-4">
          <label class="form-label fw-semibold">Set Number <span class="text-danger">*</span></label>
          <input type="text" class="form-control" name="set_number" value="{{ lego_set.set_number }}" required />
        </div>
        <div class="col-sm-8">
          <label class="form-label fw-semibold">Set Name <span class="text-danger">*</span></label>
          <input type="text" class="form-control" name="name" value="{{ lego_set.name }}" required />
        </div>
        <div class="col-sm-4">
          <label class="form-label fw-semibold">Piece Count</label>
          <input type="number" class="form-control" name="piece_count"
                 value="{{ lego_set.piece_count or '' }}" min="1" />
        </div>
        <div class="col-sm-4">
          <label class="form-label fw-semibold">Theme</label>
          <input type="text" class="form-control" name="theme" value="{{ lego_set.theme or '' }}" />
        </div>
        <div class="col-sm-4">
          <!-- placeholder for layout -->
        </div>
        <div class="col-12">
          <label class="form-label fw-semibold">Image URL</label>
          <input type="url" class="form-control" name="image_url" value="{{ lego_set.image_url or '' }}" placeholder="https://…" />
        </div>
      </div>
      <div class="d-flex gap-2 mt-4">
        <button type="submit" class="btn btn-lego-yellow fw-bold">
          <i class="bi bi-check-circle-fill"></i> Save Changes
        </button>
        <a href="{{ url_for('sets') }}" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
